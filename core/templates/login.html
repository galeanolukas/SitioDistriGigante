{% extends 'base.html' %}
{% block content %}
{% load static %}
<div class="contenido px-3 py-4 mt-3 text-center">
    <div class="row justify-content-sm-center pb-3 fs-5 fw-normal lh-sm text-body-emphasis bg-body-secondary rounded shadow-sm">
        <h3 class="pt-5">Iniciar Sesión</h3>
        <p class="border-bottom py-1"></p>
        <div class="col-sm-4 mb-5 form-signin fw-normal">
            <form class="" id="formulario" name="form" autocomplete="off" action="#" method="POST">
              {% csrf_token %}
              {% if error %}
              <p>{{ error }}</p>
              {% endif %}
              <div class="form-floating mb-3">
                  <input type="text" class="form-control" id="username" name="username" minlength="2" maxlength="30" placeholder="Nombre de usuario" required>
                  <label for="username">Nombre de usuario</label>
                  <div class="invalid-feedback">
                      Ingrese un nombre de usuario válido.
                  </div>
              </div>
              <div class="form-floating mb-3">
                  <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                  <i class="bi bi-eye-slash my-4" id="togglePassword"></i>
                  <label for="password">Contraseña</label>
                  <div class="invalid-feedback">
                      Ingrese una contraseña válida.
                  </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2">Iniciar Sesión</button>
              <hr class="mt-4 mb-2">
              <small class="text-body-secondary fw-medium">Si no tienes una cuenta, regístrate aquí: <a href="#" onclick="document.getElementById('registerModal').style.display='block'" class="text-decoration-none"><strong>Registrar</strong></a></small>
            </form>
            <hr class="mt-4 mb-2">
            <small class="text-body-secondary fw-medium">
                <a href="{% url 'reset_pass' %}" class="text-decoration-none" style="color:var(--primary); font-size:0.8em;"><strong>Olvidaste tu contraseña?</strong></a>
            </small>
        </div>
    </div>
</div>
<script>
    const togglePassword = document
        .querySelector('#togglePassword');
    const password = document.querySelector('#password');
    togglePassword.addEventListener('click', () => {
        // Toggle the type attribute using
        // getAttribure() method
        const type = password
            .getAttribute('type') === 'password' ?
            'text' : 'password';
        password.setAttribute('type', type);
        // Toggle the eye and bi-eye icon
        this.classList.toggle('bi-eye');
    });
</script>
{% endblock %}
