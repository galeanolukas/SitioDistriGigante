{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="contenido px-3 py-2 mt-3 text-center">
  <div class="row justify-content-sm-center pb-2 fs-5 fw-normal lh-sm text-body-emphasis bg-body-secondary rounded shadow-sm">
  <div class="card text-center" style="width: 100%;">
    <div class="card-body">
      <a class="" href="{{ url_close }}" style="float:right; font-size:2em;"><i class="bi bi-x-lg"></i></a>
      <h2 class="card-title">{{ titulo }}</h2>
      <p class="card-text">{{ mensaje|safe }}</p>
      <hr>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">CONTINUAR</button>
      </form>
    </div>
  </div>
</div>
</div>
{% endblock %}
